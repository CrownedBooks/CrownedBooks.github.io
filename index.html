<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "EB Garamond", serif;
        color: #f3e7d3;
        background: #0b0a08;
    }

    /* HERO */
    .hero {
        height: 100vh;
        background: url("library.jpg.png") center/cover no-repeat;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        flex-direction: column;
        padding: 20px;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.24);
        backdrop-filter: blur(2px);
    }

    .hero-content {
        position: relative;
        z-index: 2;
    }

        letter-spacing: 6px;

    }

        font-size: 72px;
        letter-spacing: 8px;
        margin-top: 10px;
        color: #f5d38a;
        text-shadow: 0 0 20px rgba(255, 210, 120, 0.3);
    }

    /* BUTTONS */
    .nav-buttons {
        margin-top: 40px;
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .nav-buttons a {
        text-decoration: none;
        padding: 14px 28px;
        border: 1px solid #d4b46a;
        color: #f5e6c8;
        font-family: "Cinzel", serif;
        letter-spacing: 2px;
        transition: 0.3s ease;
        background: rgba(0,0,0,0.4);
    }

    .nav-buttons a:hover {
        background: #d4b46a;
        color: #1a1207;
        transform: translateY(-2px);
    }
</style>
</head>

<body>

<!-- HERO -->
