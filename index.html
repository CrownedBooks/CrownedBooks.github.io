<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crowned Books</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🚫 KILL SIDE SCROLL */
html, body {
    overflow-x: hidden;
}

body {
    font-family: "EB Garamond", serif;
    color: #f3e7d3;
    background: #0b0a08;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("library.jpg.png") center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-direction: column;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.24);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.small-title {
    font-family: "Cinzel", serif;
    letter-spacing: 6px;
    font-size: 22px;
}

.main-title {
    font-family: "Cinzel Decorative", serif;
    font-size: 72px;
    letter-spacing: 8px;
    margin-top: 10px;
    color: #f5d38a;
}

/* BUTTONS */
.nav-buttons {
    margin-top: 40px;
    display: flex;
    gap: 20px;
    justify-content: center;
}

.nav-buttons a {
    text-decoration: none;
    padding: 14px 28px;
    border: 1px solid #d4b46a;
    color: #f5e6c8;
    font-family: "Cinzel", serif;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.4);
}

/* ✨ LIGHT SEAM (FIXED, NO OVERFLOW) */
.light-seam {
    position: absolute;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 100vw; /* 👈 viewport width instead of oversized % */
    height: 220px;
    background: url("light-swish.png") center no-repeat;
    background-size: cover; /* 👈 fills width cleanly */
    pointer-events: none;
    z-index: 3;
    opacity: 0.95;

    animation: seamFlow 7s ease-in-out infinite;
}

/* glow */
.light-seam::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,210,120,0.3), transparent 70%);
    filter: blur(40px);
}

/* motion */
@keyframes seamFlow {
    0% {
        transform: translateX(-50%) translateY(0) scaleX(1);
    }
    50% {
        transform: translateX(-50%) translateY(12px) scaleX(1.05);
    }
    100% {
        transform: translateX(-50%) translateY(0) scaleX(1);
    }
}

/* SECOND SECTION */
.second-section {
    position: relative;
    min-height: 110vh;
    background: url("doors.jpg.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* OVERLAY */
.second-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

/* TEXT */
.second-content {
    position: relative;
    z-index: 2;
    text-align: center;
}

.section-intro {
    font-family: "Cinzel Decorative", serif;
    font-size: 52px;
    color: #f5d38a;
}

/* DOORS */
.doors-container {
    position: relative;
    z-index: 2;
    height: 70vh;
}

.door {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 33.33%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

.door-left { left: 0; }
.door-center { left: 33.33%; }
.door-right { left: 66.66%; }

.door span {
    font-family: "Cinzel Decorative", serif;
    font-size: 28px;
    color: #f5d38a;
}

/* QUOTE */
.writer-quote {
    text-align: center;
    margin-top: 40px;
    font-style: italic;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <div class="small-title">WELCOME TO</div>
        <div class="main-title">CROWNED BOOKS</div>

        <div class="nav-buttons">
            <a href="worlds.html">WORLDS</a>
            <a href="characters-seven-swords.html">CHARACTERS</a>
            <a href="books.html">BOOKS</a>
        </div>
    </div>

    <div class="light-seam"></div>
</div>

<div class="second-section">
    <div class="second-overlay"></div>

    <div class="second-content">
        <div class="section-intro">Choose Your Path</div>
    </div>

    <div class="doors-container">
        <a href="blog.html" class="door door-left"><span>BLOG</span></a>
        <a href="about.html" class="door door-center"><span>ABOUT THE AUTHOR</span></a>
        <a href="lost-stories.html" class="door door-right"><span>LOST STORIES</span></a>
    </div>

    <div class="writer-quote">
        Stories are not found. They are uncovered.
    </div>
</div>

</body>
</html>
