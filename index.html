<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crowned Books</title>

<link rel="icon" href="favicon.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    overflow-x: hidden;
}

body {
    font-family: "EB Garamond", serif;
    background: #0b0a08;
    color: #f3e7d3;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background: url("library.jpg.png") center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-direction: column;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.small-title {
    font-family: "Cinzel", serif;
    letter-spacing: 6px;
    font-size: 22px;
}

.main-title {
    font-family: "Cinzel Decorative", serif;
    font-size: 72px;
    letter-spacing: 8px;
    margin-top: 10px;
    color: #f5d38a;
}

/* HERO BUTTONS */
.nav-buttons {
    margin-top: 40px;
    display: flex;
    gap: 20px;
    justify-content: center;
}

.nav-buttons a {
    text-decoration: none;
    padding: 14px 28px;
    border: 1px solid #d4b46a;
    color: #f5e6c8;
    font-family: "Cinzel", serif;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.4);
    transition: 0.3s ease;
}

.nav-buttons a:hover {
    background: rgba(245, 211, 138, 0.18);
    color: #ffd77a;
    border-color: #ffd77a;
    transform: translateY(-2px);
}

/* SECOND SECTION */
.second-section {
    position: relative;
    min-height: 110vh;
    background: url("doors.jpg.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.second-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
}

.second-content {
    position: relative;
    z-index: 2;
    text-align: center;
}

.section-intro {
    font-family: "Cinzel Decorative", serif;
    font-size: 52px;
    color: #f5d38a;
}

/* DOORS */
.doors-container {
    position: relative;
    z-index: 2;
    height: 70vh;
}

.door {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 33.33%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

/* soft glow layer */
.door::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255, 210, 140, 0.12), transparent 70%);
    opacity: 0.7;
    transition: 0.3s ease;
}

.door:hover::before {
    opacity: 1;
    transform: scale(1.05);
}

.door-left { left: 0; }
.door-center { left: 33.33%; }
.door-right { left: 66.66%; }

.door span {
    position: relative;
    z-index: 2;
    font-family: "Cinzel Decorative", serif;
    font-size: 28px;
    color: #f5d38a;
    transition: 0.3s ease;
}

.door:hover span {
    color: #ffe7a8;
}

/* QUOTE */
.writer-quote {
    text-align: center;
    margin-top: 40px;
    font-style: italic;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <div class="small-title">WELCOME TO</div>
        <div class="main-title">CROWNED BOOKS</div>

        <div class="nav-buttons">
            <a href="worlds.html">WORLDS</a>
            <a href="characters-seven-swords.html">CHARACTERS</a>
            <a href="books.html">BOOKS</a>
        </div>
    </div>
</div>

<div class="second-section">
    <div class="second-overlay"></div>

    <div class="second-content">
        <div class="section-intro">Choose Your Path</div>
    </div>

    <div class="doors-container">
        <a href="blog.html" class="door door-left"><span>BLOG</span></a>
        <a href="about.html" class="door door-center"><span>ABOUT THE AUTHOR</span></a>
        <a href="lost-stories.html" class="door door-right"><span>LOST STORIES</span></a>
    </div>

    <div class="writer-quote">
        Stories are not found. They are uncovered.
    </div>
</div>

</body>
</html>
