<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Arian</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: black;
    font-family: Georgia, serif;
    color: white;
    text-align: center;
  }

  .container {
    padding: 40px 20px;
  }

  h1 {
    font-size: 3em;
    letter-spacing: 2px;
    margin-bottom: 30px;
  }

  .map {
    max-width: 90%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
  }

  .quote {
    margin-top: 40px;
    font-size: 1.3em;
    font-style: italic;
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="container">
  <h1>MAP OF ARIAN</h1>

  <img src="map-arian.png" alt="Map of Arian" class="map">

  <div class="quote">
    "Every path in Arian was carved by fate… or by those bold enough to defy it."
  </div>
</div>

</body>
</html>
