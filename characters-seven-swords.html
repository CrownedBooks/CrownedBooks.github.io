      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;

    }

    .char-btn {

      padding: 12px;
      background: #2c1b14;
      color: #fff;
      text-align: center;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .char-btn:hover {
      background: #4a2c20;
      transform: scale(1.03);
    }
  </style>
</head>
