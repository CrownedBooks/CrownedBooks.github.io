<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>

<!-- Cinzel Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Cinzel', serif;
        background: url("books-background.jpg") no-repeat center center fixed;
        background-size: cover;
        color: white;
        overflow-x: hidden;
    }

    .overlay {
        min-height: 200vh;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 80px;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 40px;
        letter-spacing: 2px;
        text-align: center;
    }

    .series-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        max-width: 900px;
        margin-bottom: 80px;
    }

    .series-btn {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-family: 'Cinzel', serif;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        text-decoration: none;
    }

    .series-btn:hover {
        transform: scale(1.08);
        background: rgba(255, 255, 255, 0.15);
        border-color: white;
    }

    /* QUOTE */
    .quote {
        max-width: 900px;
        margin: 60px 20px 100px 20px;
        text-align: center;
        font-size: 38px;
        line-height: 1.4;

        /* Fancy script feel */
        font-family: "Edwardian Script ITC", "Brush Script MT", cursive;

        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    .sneak-peek-wrapper {
        margin-top: auto;
        padding-bottom: 80px;
        text-align: center;
    }

    .sneak-peek-btn {
        padding: 18px 40px;
        font-size: 22px;
        border-radius: 40px;
        border: 2px solid white;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-family: 'Cinzel', serif;
        text-decoration: none;
        transition: 0.3s ease;
    }

    .sneak-peek-btn:hover {
        background: white;
        color: black;
    }
</style>
</head>

<body>

<div class="overlay">

    <h1>Books</h1>

    <!-- SERIES BUTTONS -->
    <div class="series-container">

        <a class="series-btn" href="#">The Seven Series</a>
        <a class="series-btn" href="#">The Never Fails Series</a>
        <a class="series-btn" href="#">Medieval Story</a>
        <a class="series-btn" href="#">The Kearin County Series</a>

    </div>

    <!-- QUOTE -->
    <div class="quote">
        "Be ready, and be prepared, for I have called you to aid the realm of Arian in its time of greatest need."
    </div>

    <!-- SNEAK PEEK -->
    <div class="sneak-peek-wrapper">
        <a class="sneak-peek-btn" href="sneak-peek.html">Sneak Peek</a>
    </div>

</div>

</body>
</html>
