<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Crowned Books</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "EB Garamond", serif;
    background: #0b0a08;
    color: #f3e7d3;
}

/* HERO */
.hero {
    height: 60vh;
    background: url("library.jpg.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-family: "Cinzel Decorative", serif;
    font-size: 60px;
    color: #f5d38a;
}

/* CONTENT */
.content {
    padding: 60px 20px;
    max-width: 900px;
    margin: auto;
}

.post {
    margin-bottom: 40px;
}

.post h2 {
    color: #f5d38a;
}

.post p {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Blog</h1>
</div>

<div class="content">

    <div class="post">
        <h2>First Entry</h2>
        <p>This is where your thoughts, updates, and writing process will go. Replace this with real content when you're ready.</p>
    </div>

    <div class="post">
        <h2>Another Entry</h2>
        <p>You can keep adding posts like this. Eventually, you might want something dynamic, but for now, this works.</p>
    </div>

</div>

</body>
</html>
