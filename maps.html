<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Maps</title>

<style>
  body {
    margin: 0;
    background: #0e0b0a;
    color: #f5f1e8;
    font-family: Georgia, serif;
    text-align: center;
  }

  h1 {
    margin-top: 25px;
    letter-spacing: 3px;
  }

  .map-wrapper {
    position: relative;
    display: inline-block;
    margin-top: 30px;
  }

  .map-wrapper img {
    width: 85%;
    max-width: 1000px;
    border: 3px solid #3a2a22;
    border-radius: 12px;
    display: block;
  }

  /* Base hotspot style */
  .region {
    position: absolute;
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 10px;
  }

  /* Hover glow effect */
  .region:hover {
    box-shadow: 0 0 25px rgba(212,180,106,0.8);
    transform: scale(1.05);
  }

  /* Labels */
  .label {
    position: absolute;
    background: rgba(0,0,0,0.6);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    opacity: 0;
    transition: 0.2s ease;
    pointer-events: none;
  }

  .region:hover .label {
    opacity: 1;
  }

  /* ===== REGION POSITIONS (YOU WILL ADJUST THESE) ===== */

  .arian {
    top: 15%;
    left: 10%;
    width: 18%;
    height: 20%;
  }

  .calvarra {
    top: 15%;
    left: 32%;
    width: 18%;
    height: 20%;
  }

  .ellik {
    top: 20%;
    left: 58%;
    width: 15%;
    height: 18%;
  }

  .preyland {
    top: 55%;
    left: 12%;
    width: 20%;
    height: 22%;
  }

  .kinswell {
    top: 55%;
    left: 38%;
    width: 20%;
    height: 22%;
  }

  .stoneforge {
    top: 55%;
    left: 65%;
    width: 15%;
    height: 20%;
  }

  .corrial {
    top: 25%;
    left: 75%;
    width: 15%;
    height: 18%;
  }

</style>
</head>

<body>

<h1>WORLD MAP</h1>

<div class="map-wrapper">

  <img src="map.jpg" alt="World Map">

  <!-- ARIAN -->
  <a href="map-arian.html" class="region arian">
    <div class="label">Arian</div>
  </a>

  <!-- CALVARRA -->
  <a href="map-calvarra.html" class="region calvarra">
    <div class="label">Calvarra</div>
  </a>

  <!-- ELLIK -->
  <a href="map-ellik.html" class="region ellik">
    <div class="label">Ellik</div>
  </a>

  <!-- PREYLAND -->
  <a href="map-preyland.html" class="region preyland">
    <div class="label">Preyland</div>
  </a>

  <!-- KINSWELL -->
  <a href="map-kinswell.html" class="region kinswell">
    <div class="label">Kinswell</div>
  </a>

  <!-- STONEFORGE -->
  <a href="map-stoneforge.html" class="region stoneforge">
    <div class="label">Stoneforge</div>
  </a>

  <!-- CORRIAL -->
  <a href="map-corrial.html" class="region corrial">
    <div class="label">Corrial</div>
  </a>

</div>

</body>
</html>
