<!DOCTYPE html>
<html>
<head>
  <title>World Maps</title>

  <style>
    body {
      margin: 0;
      background: #0e0b0a;
      color: #f5f1e8;
      font-family: Georgia, serif;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      letter-spacing: 3px;
    }

    img {
      width: 85%;
      max-width: 1000px;
      border: 3px solid #3a2a22;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<h1>WORLD MAP</h1>

<img src="map.jpg" usemap="#worldmap">

<map name="worldmap">

  <!-- ARIAN -->
  <area shape="rect"
        coords="100,120,250,260"
        href="map-arian.html"
        alt="Map of Arian">

  <!-- CALVARRA -->
  <area shape="rect"
        coords="300,120,450,260"
        href="map-calvarra.html"
        alt="Map of Calvarra">

  <!-- ELLIK -->
  <area shape="circle"
        coords="600,180,70"
        href="map-ellik.html"
        alt="Map of Ellik">

  <!-- PREYLAND -->
  <area shape="poly"
        coords="150,350,220,320,280,400,200,450"
        href="map-preyland.html"
        alt="Map of Preyland">

  <!-- KINSWELL -->
  <area shape="rect"
        coords="500,320,650,450"
        href="map-kinswell.html"
        alt="Map of Kinswell">

  <!-- STONEFORGE -->
  <area shape="circle"
        coords="750,350,60"
        href="map-stoneforge.html"
        alt="Map of Stoneforge">

  <!-- CORRIAL -->
  <area shape="poly"
        coords="700,120,820,150,780,240,690,210"
        href="map-corrial.html"
        alt="Map of Corrial">

</map>

</body>
</html>
