<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Stories | Crowned Books</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "EB Garamond", serif;
    background: #0b0a08;
    color: #f3e7d3;
}

/* HERO */
.hero {
    height: 60vh;
    background: url("doors.jpg.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-family: "Cinzel Decorative", serif;
    font-size: 60px;
    color: #f5d38a;
}

/* CONTENT */
.content {
    padding: 60px 20px;
    max-width: 900px;
    margin: auto;
}

.story {
    margin-bottom: 50px;
}

.story h2 {
    color: #f5d38a;
}

.story p {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Lost Stories</h1>
</div>

<div class="content">

    <div class="story">
        <h2>The Forgotten Path</h2>
        <p>A story that never made it into your main books. A fragment. A whisper. Expand this later.</p>
    </div>

    <div class="story">
        <h2>Echoes of Something Unfinished</h2>
        <p>This is where abandoned ideas go to haunt you until you turn them into something real.</p>
    </div>

</div>

</body>
</html>
